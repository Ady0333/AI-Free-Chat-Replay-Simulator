<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Replay Simulator</title>
    <link rel="stylesheet" href="chat_box.css">
</head>
<body>
    <div class="container">
        <!-- Header with controls -->
        <header class="header">
            <h1>Chat Replay Simulator</h1>
            <div class="controls">
                <button id="playBtn" class="btn btn-primary">Play</button>
                <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
                <div class="speed-controls">
                    <label for="speedSelect">Speed:</label>
                    <select id="speedSelect" class="speed-select">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="2">2x</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Chat messages container -->
        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <!-- Messages will be dynamically added here -->
            </div>
        </div>

</body>
</html>
